name: CI

# Typecheck + unit tests on every push and PR. Keeps main green before deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Generate the Prisma client so types resolve (no DB needed for generate).
      - run: npx prisma generate
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        env:
          JWT_SECRET: ci-test-secret-0123456789abcdef
        run: npm test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Typecheck + build
        working-directory: frontend
        run: npm run build
