name: Deploy Brochure to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'brochure/**'
      - '.github/workflows/deploy-brochure.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: ./brochure
        run: npm ci

      - name: Build brochure
        working-directory: ./brochure
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-qa-engineer-brochure
          workingDirectory: brochure
