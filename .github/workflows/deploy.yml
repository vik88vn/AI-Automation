name: Deploy

# Deploys the frontend to Cloudflare Pages on every push to main.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# Required repository variable:
#   VITE_API_TARGET        — backend URL, e.g. https://api.example.com
#
# The backend (Railway/Render) deploys via that platform's own git integration;
# see CLOUDFLARE_DEPLOYMENT.md. This workflow only ships the static frontend.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Build + deploy frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_TARGET: ${{ vars.VITE_API_TARGET }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=ai-qa-engineer-frontend --branch=main
