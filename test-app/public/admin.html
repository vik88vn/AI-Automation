<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — BugShop</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bug-banner">
    DEMO APP: This site contains intentional bugs for QA agent testing.
  </div>

  <nav>
    <a href="/" class="logo">BugShop</a>
    <a href="/products.html">Products</a>
    <a href="/admin.html">Admin</a>
    <div class="right">
      <a href="/login.html">Sign in</a>
    </div>
  </nav>

  <main style="max-width: 600px;">
    <h1>Admin</h1>
    <p>Add a new product to the catalog.</p>

    <div class="card">
      <h2>New product</h2>
      <div id="msg"></div>

      <form id="newProduct" method="post" action="/api/admin/products">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Product name" />
        </div>
        <div class="form-group">
          <label for="price">Price (USD)</label>
          <input type="number" id="price" name="price" placeholder="0.00" step="0.01" min="0.01" required />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" placeholder="e.g. audio, wearables, accessories" list="category-options" />
          <datalist id="category-options">
            <option value="audio">Audio</option>
            <option value="wearables">Wearables</option>
            <option value="accessories">Accessories</option>
          </datalist>
        </div>
        <button type="submit" id="submit">Save product</button>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById("newProduct");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "";

      const name = document.getElementById("name").value.trim();
      const price = document.getElementById("price").value;
      const category = document.getElementById("category").value;

      // BUG #5 (LOW / Validation gap): Frontend doesn't enforce category required.
      // It sends an empty string straight to the backend, which then crashes.
      // (Real fix: validate category here before submitting.)

      if (!name || !price) {
        msg.innerHTML = '<div class="error">Name and price are required</div>';
        return;
      }

      // BUG_005 fix: reject non-positive prices on the client as well, so the
      // backend's price > 0 rule is mirrored in the UI.
      const priceNum = parseFloat(price);
      if (!Number.isFinite(priceNum) || priceNum <= 0) {
        msg.innerHTML = '<div class="error">Price must be greater than 0</div>';
        return;
      }

      try {
        const res = await fetch("/api/admin/products", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, price, category }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          msg.innerHTML = `<div class="success">Created: ${data.product.name}</div>`;
          form.reset();
        } else {
          msg.innerHTML = `<div class="error">HTTP ${res.status}: ${data.error || "Failed"}</div>`;
        }
      } catch (err) {
        msg.innerHTML = '<div class="error">Network error or server crash.</div>';
      }
    });
  </script>
</body>
</html>
</content>
</invoke>
