<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — BugShop</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bug-banner">
    DEMO APP: This site contains intentional bugs for QA agent testing.
  </div>

  <nav>
    <a href="/" class="logo">BugShop</a>
    <a href="/products.html">Products</a>
    <a href="/admin.html">Admin</a>
    <div class="right">
      <a href="/signup.html">Sign up</a>
    </div>
  </nav>

  <main style="max-width: 420px;">
    <div class="card">
      <h1>Sign in</h1>
      <p>Welcome back. Enter your credentials.</p>

      <div id="msg"></div>

      <form id="login" method="post" action="/api/login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" />
        </div>
        <button type="submit" id="submit">Sign in</button>
      </form>

      <p class="muted center" style="margin-top: 16px; font-size: 13px;">
        New here? <a href="/signup.html">Create an account</a>
      </p>
    </div>
  </main>

  <script>
    const form = document.getElementById("login");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      // BUG #1 (HIGH): Frontend doesn't validate password is non-empty
      // before submitting. Combined with the backend bug, login proceeds
      // with empty passwords. (Real validation should be: if (!password) ...)
      if (!email) {
        msg.innerHTML = '<div class="error">Email is required</div>';
        return;
      }

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          window.location.href = data.redirect || "/dashboard.html";
        } else {
          msg.innerHTML = `<div class="error">${data.error || "Sign in failed"}</div>`;
        }
      } catch (err) {
        msg.innerHTML = '<div class="error">Network error. Try again.</div>';
      }
    });
  </script>
</body>
</html>
