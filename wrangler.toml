# Cloudflare Pages configuration for AI QA Engineer frontend

name = "ai-qa-engineer"
type = "javascript"
compatibility_date = "2024-12-01"

# Production deployment settings
[env.production]
name = "ai-qa-engineer-prod"
routes = [
  { pattern = "example.com/*", zone_id = "your_zone_id" },
]

# Build configuration
[build]
command = "npm run build"
cwd = "./frontend"
watch_paths = ["../src/**/*.tsx", "../src/**/*.ts"]

# Environment variables
[env.production.vars]
VITE_API_TARGET = "https://api.example.com"

# Dev environment (for local testing)
[env.dev]
vars = { VITE_API_TARGET = "http://localhost:4310" }

# Pages-specific configuration
[pages_build_caching]
on_platform_apis = true

# Output directory where Vite builds to
build.upload = { directory = "frontend/dist" }

# Rewrite rules: route all requests to index.html for SPA routing
[[routes]]
pattern = "example.com/*"
custom_domain = true

# Note: Cloudflare Pages automatically handles SPA routing (index.html fallback)
# No additional rewrite rules needed
