# Cloudflare Pages Configuration
# Frontend deployment for AI QA Engineer

name = "ai-qa-engineer"
type = "javascript"
compatibility_date = "2024-12-01"
main = "frontend/dist/index.html"

# Build configuration
[build]
command = "cd frontend && npm install && npm run build"
watch_paths = ["frontend/src/**/*.tsx", "frontend/src/**/*.ts"]

# Environment variables (development)
[env.development]
vars = { VITE_API_TARGET = "http://localhost:4310" }

# Environment variables (production)
[env.production]
vars = { VITE_API_TARGET = "https://api.example.com" }

# Pages-specific settings
pages_build_caching = true

# Deploy hooks (optional)
# webhook_secret = "your-secret-here"
